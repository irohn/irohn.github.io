<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A minimal shell-like website with terminal-inspired typing."
    />
    <title>Shell</title>
    <link rel="stylesheet" href="assets/styles/main.css" />
  </head>
  <body>
    <main class="page-shell">
      <section
        class="terminal"
        aria-label="Interactive terminal mockup"
        tabindex="0"
      >
        <div class="terminal__chrome" aria-hidden="true">
          <span class="terminal__dot terminal__dot--close"></span>
          <span class="terminal__dot terminal__dot--minimize"></span>
          <span class="terminal__dot terminal__dot--maximize"></span>
        </div>

        <div class="terminal__body">
          <p class="terminal__line terminal__line--muted">
            For more information type `help`.
          </p>

          <div id="terminal-history" class="terminal__history"></div>

          <label class="terminal__prompt-row" for="terminal-input">
            <span class="terminal__prompt" aria-hidden="true">guest@site:~$</span>
            <span id="terminal-text" class="terminal__text"></span>
            <span class="terminal__cursor" aria-hidden="true"></span>
          </label>
        </div>
      </section>

      <textarea
        id="terminal-input"
        class="terminal__input"
        autocapitalize="off"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Terminal input"
      ></textarea>
    </main>

    <script src="assets/scripts/main.js"></script>
  </body>
</html>
