<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A minimal shell-like website with terminal-inspired typing."
    />
    <title>Shell</title>
    <link rel="stylesheet" href="assets/styles/main.css" />
  </head>
  <body>
    <main class="page-shell">
      <div id="desktop-dock" class="desktop-dock" hidden>
        <button
          id="terminal-launcher"
          class="desktop-app"
          type="button"
          aria-label="Open terminal"
        >
          <span class="desktop-app__icon desktop-app__icon--terminal" aria-hidden="true">

              />
            </svg>
          </span>
        </button>

        <button
          id="browser-launcher"
          class="desktop-app"
          type="button"
          aria-label="Open browser"
        >

          </span>
        </button>
      </div>

      <section
        id="terminal-window"
        class="terminal"
        aria-label="Interactive terminal mockup"
        tabindex="0"
      >
        <div class="terminal__chrome">
          <div class="terminal__controls">
            <button
              id="terminal-close"
              class="terminal__dot terminal__dot--close"
              type="button"
              aria-label="Close terminal"
            >
              <span class="terminal__dot-icon" aria-hidden="true">x</span>
            </button>
            <button
              id="terminal-minimize"
              class="terminal__dot terminal__dot--minimize"
              type="button"
              aria-label="Minimize terminal"
            >
              <span class="terminal__dot-icon" aria-hidden="true">-</span>
            </button>
            <button
              id="terminal-maximize"
              class="terminal__dot terminal__dot--maximize"
              type="button"
              aria-label="Maximize terminal"
            >
              <span class="terminal__dot-icon" aria-hidden="true">□</span>
            </button>
          </div>
        </div>

        <div class="terminal__body">
          <p class="terminal__line terminal__line--muted">
            For more information type `help`.
          </p>

          <div id="terminal-history" class="terminal__history"></div>

          <label class="terminal__prompt-row" for="terminal-input">
            <span class="terminal__prompt" aria-hidden="true"></span>
            <span id="terminal-text" class="terminal__text"></span>
            <span class="terminal__cursor" aria-hidden="true"></span>
          </label>
        </div>
      </section>

      <section
        id="browser-window"
        class="browser-window"
        aria-label="Browser window"
        tabindex="0"
        hidden
      >
        <div class="terminal__chrome browser__chrome">
          <div class="terminal__controls">
            <button
              id="browser-close"
              class="terminal__dot terminal__dot--close"
              type="button"
              aria-label="Close browser"
            >
              <span class="terminal__dot-icon" aria-hidden="true">x</span>
            </button>
            <button
              id="browser-minimize"
              class="terminal__dot terminal__dot--minimize"
              type="button"
              aria-label="Minimize browser"
            >
              <span class="terminal__dot-icon" aria-hidden="true">-</span>
            </button>
            <button
              id="browser-maximize"
              class="terminal__dot terminal__dot--maximize"
              type="button"
              aria-label="Maximize browser"
            >
              <span class="terminal__dot-icon" aria-hidden="true">□</span>
            </button>
          </div>

          <div class="browser__address-shell">
            <div id="browser-address" class="browser__address" aria-label="Browser address"></div>
          </div>
        </div>

        <div class="browser__body">
          <iframe
            id="browser-frame"
            class="browser__frame"
            title="Browser content"
          ></iframe>
        </div>
      </section>

        id="terminal-input"

        spellcheck="false"
        aria-label="Terminal input"
      ></textarea>
