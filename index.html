<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A minimal shell-like website with terminal-inspired typing."
    />
    <title>Shell</title>
    <link rel="stylesheet" href="assets/styles/main.css" />
  </head>
  <body>
    <main class="page-shell">
      <div id="desktop-dock" class="desktop-dock" hidden>
        <button
          id="terminal-launcher"
          class="desktop-app"
          type="button"
          aria-label="Open terminal"
        >
          <span class="desktop-app__icon desktop-app__icon--terminal" aria-hidden="true"
            >>_</span
          >
          <span class="desktop-app__label">Terminal</span>
        </button>

        <a
          class="desktop-app"
          href="https://github.com/irohn"
          target="_blank"
          rel="noreferrer noopener"
          aria-label="Open GitHub"
        >
          <span class="desktop-app__icon desktop-app__icon--github" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
              <path

              />
            </svg>
          </span>
          <span class="desktop-app__label">GitHub</span>
        </a>

        <a
          class="desktop-app"
          href="https://www.linkedin.com/in/ori-sne-356a92183"
          target="_blank"
          rel="noreferrer noopener"
          aria-label="Open LinkedIn"
        >
          <span class="desktop-app__icon desktop-app__icon--linkedin" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
              <path
                d="M6.94 8.5H3.56V20h3.38V8.5ZM5.25 3A2.02 2.02 0 1 0 5.3 7.04 2.02 2.02 0 0 0 5.25 3ZM20.44 12.67c0-3.47-1.85-5.08-4.33-5.08-2 0-2.89 1.1-3.39 1.87V8.5H9.34c.04.63 0 11.5 0 11.5h3.38v-6.42c0-.34.02-.68.12-.92.27-.68.88-1.39 1.9-1.39 1.34 0 1.88 1.02 1.88 2.52V20H20V13.4c0-.24.01-.49.01-.73Z"
              />
            </svg>
          </span>
          <span class="desktop-app__label">LinkedIn</span>
        </a>
      </div>

      <section
        id="terminal-window"
        class="terminal"
        aria-label="Interactive terminal mockup"
        tabindex="0"
      >
        <div class="terminal__chrome">
          <div class="terminal__controls">
            <button
              id="terminal-close"
              class="terminal__dot terminal__dot--close"
              type="button"
              aria-label="Close terminal"
            ></button>
            <button
              id="terminal-minimize"
              class="terminal__dot terminal__dot--minimize"
              type="button"
              aria-label="Minimize terminal"
            ></button>
            <button
              id="terminal-maximize"
              class="terminal__dot terminal__dot--maximize"
              type="button"
              aria-label="Maximize terminal"
            ></button>
          </div>

            class="theme-toggle"
            type="button"

            aria-pressed="false"

        <div class="terminal__body">
          <p class="terminal__line terminal__line--muted">
            For more information type `help`.
          </p>

          <div id="terminal-history" class="terminal__history"></div>

          <label class="terminal__prompt-row" for="terminal-input">
            <span class="terminal__prompt" aria-hidden="true">guest@site:~$</span>
            <span id="terminal-text" class="terminal__text"></span>
            <span class="terminal__cursor" aria-hidden="true"></span>
          </label>
        </div>
      </section>

      <textarea
        id="terminal-input"
        class="terminal__input"
        autocapitalize="off"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Terminal input"
      ></textarea>
    </main>

    <script src="assets/scripts/main.js"></script>
  </body>
</html>
