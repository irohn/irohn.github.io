<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Links</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <style>
      :root {
        color-scheme: dark;
        --links-background: #0e0e10;
        --links-text: #f1f1f1;
        --links-card: rgba(20, 20, 22, 0.92);
        --links-border: rgba(255, 255, 255, 0.08);
        --links-shadow: rgba(0, 0, 0, 0.28);
        --links-icon-background: rgba(255, 255, 255, 0.05);
        --links-icon-color: #f5f5f5;
        --links-heading-muted: #a0a0a0;
        --links-anchor: #f1f1f1;
        --links-anchor-hover: #d0d0d0;
        --links-description: #a0a0a0;
        --links-kicker: #808080;
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --links-background: #eef1f5;
        --links-text: #18212f;
        --links-card: rgba(248, 249, 251, 0.95);
        --links-border: rgba(15, 23, 42, 0.08);
        --links-shadow: rgba(15, 23, 42, 0.12);
        --links-icon-background: rgba(15, 23, 42, 0.05);
        --links-icon-color: #202938;
        --links-heading-muted: #657285;
        --links-anchor: #18212f;
        --links-anchor-hover: #cfd4dc;
        --links-description: #657285;
        --links-kicker: #657285;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--links-background) !important;
        background-image: none !important;
        color: var(--links-text);
      }

      html {
        background: var(--links-background) !important;
        background-image: none !important;
      }

      main,
      section,
      .container,
      .links-shell {
        background: transparent !important;
        background-image: none !important;
      }

      .links-shell {
        max-width: 48rem;
      }

      .links-card {
        background: var(--links-card) !important;
        border: 1px solid var(--links-border);
        border-radius: 1rem;
        box-shadow: 0 18px 48px var(--links-shadow);
      }

      .links-title {
        letter-spacing: 0.04em;
      }

      .links-list .list-group-item {
        background: transparent;
        color: inherit;
        border-color: var(--links-border);
      }

      .links-icon {
        width: 2.75rem;
        height: 2.75rem;
        display: inline-grid;
        place-items: center;
        border-radius: 0.85rem;
        background: var(--links-icon-background);
        color: var(--links-icon-color);
        flex-shrink: 0;
      }

      .links-icon svg {
        width: 1.1rem;
        height: 1.1rem;
      }

      .links-anchor {
        color: var(--links-anchor);
        text-decoration: none;
      }

      .links-anchor:hover {
        color: var(--links-anchor-hover);
      }

      .links-description {
        color: var(--links-description);
      }

      .links-kicker,
      .links-subtitle {
        color: var(--links-kicker) !important;
      }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <section class="links-shell mx-auto">
        <div class="links-card p-4 p-md-5">
          <p class="text-uppercase small links-kicker mb-2">SOCIALS</p>

          <div class="list-group list-group-flush links-list">
            <a
              class="list-group-item px-0 py-3 links-anchor"
              href="https://github.com/irohn"
              target="_blank"
              rel="noreferrer noopener"
            >
              <div class="d-flex align-items-start gap-3">
                <span class="links-icon" aria-hidden="true">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-github"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"
                    />
                  </svg>
                </span>
                <span class="flex-grow-1">
                  <span class="d-block fw-semibold">GitHub</span>
                  <span class="d-block small links-description">
                    Projects, experiments, and source code.
                  </span>
                </span>
              </div>
            </a>

            <a
              class="list-group-item px-0 py-3 links-anchor"
              href="https://www.linkedin.com/in/ori-sne-356a92183"
              target="_blank"
              rel="noreferrer noopener"
            >
              <div class="d-flex align-items-start gap-3">
                <span class="links-icon" aria-hidden="true">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-linkedin"
                    viewBox="0 0 16 16"
                  >
                    <path
                      d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854zm4.943 12.248V6.169H2.542v7.225zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248S2.4 3.226 2.4 3.934c0 .694.521 1.248 1.327 1.248zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225z"
                    />
                  </svg>
                </span>
                <span class="flex-grow-1">
                  <span class="d-block fw-semibold">LinkedIn</span>
                  <span class="d-block small links-description">
                    Work history, profile, and professional contact details.
                  </span>
                </span>
              </div>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const themeStorageKey = "irohn-theme-preference";

      function applyTheme(theme) {
        const resolvedTheme = theme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = resolvedTheme;
      }

      function syncThemeFromParent() {
        try {
          const parentTheme =
            window.parent?.document?.documentElement?.dataset?.theme ||
            window.localStorage.getItem(themeStorageKey) ||
            "dark";
          applyTheme(parentTheme);
        } catch (_error) {
          applyTheme(window.localStorage.getItem(themeStorageKey) || "dark");
        }
      }

      syncThemeFromParent();
      window.addEventListener("storage", (event) => {
        if (event.key === themeStorageKey) {
          applyTheme(event.newValue || "dark");
        }
      });

      try {
        const parentRoot = window.parent?.document?.documentElement;

        if (parentRoot) {
          const observer = new MutationObserver(() => {
            syncThemeFromParent();
          });

          observer.observe(parentRoot, {
            attributes: true,
            attributeFilter: ["data-theme"],
          });
        }
      } catch (_error) {
        // Cross-origin access is not expected here, but ignore if it happens.
      }
    </script>
  </body>
</html>
