<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume - Ori Sne</title>
    <script>
      fetch("/assets/pages/resume.html")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Unable to load resume");
          }

          return response.text();
        })
        .then((html) => {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(() => {
          window.location.replace("/assets/pages/resume.html");
        });
    </script>
  </head>
  <body>
    <p>
      Redirecting to
      <a href="/assets/pages/resume.html">Ori Sne's resume</a>.
    </p>
  </body>
</html>
